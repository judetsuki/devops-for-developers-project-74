version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: mtfoxtrot/devops-for-developers-project-74:latest
    depends_on:
      db:
        condition: service_healthy 
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=postgres
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=password
    ports:
      - "8080:8080"

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
