services:
  app:
    build:
      context: .
      dockerfile: Dockerfile 
    command: make dev
    depends_on:
      - db
    environment:
      - NODE_ENV=development
    volumes:
      - ./app:/app
      - /app/node_modules

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
